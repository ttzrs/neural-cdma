name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (CPU torch + package)
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ./watermark_pkg
      - name: Run CPU tests (codec + p-value math; GPU model tests skipped)
        run: |
          pytest watermark_pkg/tests/test_codec.py watermark_pkg/tests/test_verify_pvalue.py -q
